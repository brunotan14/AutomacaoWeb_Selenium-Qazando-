name: Automacao Web

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

jobs:
  RunTest:
    runs-on: ubuntu-latest
    container:
      image: selenium/standalone-chrome:latest

    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4

      - name: Run tests
        run: mvn clean test -Dbrowser=chrome-ci

      - name: Upload Relatório Extent
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Automacao-Web
          path: target/extent-report.html