name: Automacao Web

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

jobs:
  RunTest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run tests
        run: mvn clean test -Dbrowser=chrome-ci

      - name: Upload Relatório Extent
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Relatorio-Automacao-Web
          path: target/extent-report.html