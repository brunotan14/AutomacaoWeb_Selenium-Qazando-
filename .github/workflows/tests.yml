name: CI - Selenium + Java

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qazando-ci:${{ github.sha }} .

      - name: Prepare target dir
        run: mkdir -p target

      - name: Run tests (inside Docker)
        run: docker run --rm --shm-size=2g -v "${{ github.workspace }}/target:/app/target" qazando-ci:${{ github.sha }}

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: target/Relatorio-extent.html
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn